version: "3.9"

services:
  backend:
    build: ./backend                # path to backend Dockerfile
    container_name: tastebuddin-backend
    ports:
      - "5001:5000"                 # host:container
    env_file:
      - ./backend/.env              # Supabase keys, etc.
    volumes:
      - ./backend:/app              # live-reload during dev
    restart: always
    networks:
      - app-network

  frontend:
    build: ./pages
    container_name: tastebuddin-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: always
    networks:
      - app-network

networks:
  app-network:
